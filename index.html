<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scheda D&D 5e Multi-PG</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <!-- Menu a tendina per cambiare al volo personaggio -->
            <select id="selettore-pg" onchange="cambiaPersonaggio(this.value)" style="background:#2d2d2d; color:white; border:1px solid #444; padding:8px; font-weight:bold; border-radius:4px; font-size:14px; max-width:180px;"></select>
            <div>
                <h1 id="header-nome" style="font-size:18px;">Caricamento...</h1>
                <p id="header-classe">Attendere prego</p>
            </div>
        </div>
        <div style="display:flex; gap:8px;">
            <button class="btn-header" onclick="esportaDatiDND()">📤 Esporta</button>
            <label class="btn-header" style="cursor:pointer; display:inline-block;">
                📥 Importa <input type="file" id="file-import" accept=".json" onchange="importiDatiDND(event)" style="display:none;">
            </label>
            <button class="btn-header" style="background:#444;" onclick="switchSchermata()">⚙️ Gestisci PG</button>
        </div>
    </header>

    <!-- 1. VISTA SCHERMA DI GIOCO -->
    <div id="schermata-gioco" class="dashboard">
        <div class="col-sinistra">
            <div class="row-vitali">
                <div class="card card-pf box-vitale">
                    <h3>Punti Ferita</h3>
                    <div class="valore"><span id="pf-attuali">0</span> / <span id="pf-massimi">0</span></div>
                    <div>
                        <button class="btn-pf meno" onclick="modificaPF(-1)">-1</button>
                        <button class="btn-pf piu" onclick="modificaPF(1)">+1</button>
                    </div>
                </div>
                <div class="card box-vitale" style="display: flex; align-items: center; justify-content: space-around;">
                    <div><h3>CA</h3><div class="valore" id="valore-ca">0</div></div>
                    <div><h3>Iniziativa</h3><div class="valore" id="valore-iniz">0</div></div>
                    <div><h3>Perc. Passiva</h3><div class="valore" id="valore-perc">0</div></div>
                </div>
            </div>
            <div class="griglia-carat" id="contenitore-caratteristiche"></div>
        </div>

        <div class="col-destra">
            <div class="box-dadi" id="display-tiri">🎲 Clicca su un'abilità o attacco!</div>
            <div class="card" style="flex-grow: 1; overflow-y: auto;">
                <div class="sezione-titolo">Attacchi Rapidi</div>
                <ul class="lista-interattiva" id="contenitore-attacchi"></ul>
                <div class="sezione-titolo" style="margin-top: 15px;">Note e Privilegi</div>
                <div id="contenitore-note" style="font-size: 13px; white-space: pre-line; color:#ccc; line-height: 1.4;"></div>
            </div>
        </div>

        <div class="col-destra" style="flex: 1.1;">
            <div class="card" style="height: 100%; overflow-y: auto;">
                <div class="sezione-titolo">Abilità e Competenze</div>
                <ul class="lista-interattiva" id="contenitore-competenze"></ul>
            </div>
        </div>
    </div>

    <!-- 2. VISTA PANNELLO DI MODIFICA (FORM) -->
    <div id="schermata-editor">
        <!-- Scelta Azione (Modifica o Nuovo) -->
        <div class="card" style="margin-bottom: 15px; background: #252525; display:flex; gap:20px; padding:10px;">
            <label style="color:white; font-weight:bold; font-size:14px; cursor:pointer;">
                <input type="radio" name="azione-pg" id="editor-modifica" checked> ✏️ Modifica Personaggio Attuale
            </label>
            <label style="color:#ffc107; font-weight:bold; font-size:14px; cursor:pointer;">
                <input type="radio" name="azione-pg" id="editor-nuovo"> ➕ Crea un NUOVO Personaggio
            </label>
        </div>

        <div class="form-group">
            <label>Nome Personaggio</label>
            <input type="text" id="input-nome">
        </div>
        <div class="form-group">
            <label>Classe e Livello</label>
            <input type="text" id="input-classe">
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <div class="form-group" style="flex:1;">
                <label>PF Massimi</label>
                <input type="number" id="input-pf">
            </div>
            <div class="form-group" style="flex:1;">
                <label>Classe Armatura (CA)</label>
                <input type="number" id="input-ca">
            </div>
            <div class="form-group" style="flex:1;">
                <label>Iniziativa</label>
                <input type="number" id="input-iniz">
            </div>
            <div class="form-group" style="flex:1;">
                <label>Perc. Passiva</label>
                <input type="number" id="input-perc">
            </div>
            <div class="form-group" style="flex:1;">
                <label>Bonus Comp.</label>
                <input type="number" id="input-bonus-comp">
            </div>
        </div>

        <label style="display:block; font-size:11px; color:#ffc107; font-weight:bold; margin-bottom:4px;">CARATTERISTICHE</label>
        <div class="griglia-form-carat">
            <div class="form-group"><label>FOR</label><input type="number" id="input-for"></div>
            <div class="form-group"><label>DES</label><input type="number" id="input-des"></div>
            <div class="form-group"><label>COS</label><input type="number" id="input-cos"></div>
            <div class="form-group"><label>INT</label><input type="number" id="input-int"></div>
            <div class="form-group"><label>SAG</label><input type="number" id="input-sag"></div>
            <div class="form-group"><label>CAR</label><input type="number" id="input-car"></div>
        </div>

        <div class="form-group">
            <label>Attacchi Rapidi (Nome,Bonus,Danno; Nome,Bonus,Danno)</label>
            <input type="text" id="input-attacchi">
        </div>

        <div class="form-group">
            <label>Competenze Abilità (Usa * per la Maestria)</label>
            <input type="text" id="input-competenze">
        </div>
		
		<div class="form-group">
            <label>Competenze Abilità (Usa * per la Maestria)</label>
            <input type="text" id="input-competenze">
        </div>

        <div class="form-group">
            <label>Competenze Tiri Salvezza (Scrivi le tre lettere separate da virgola. Es: FOR, COS)</label>
            <input type="text" id="input-ts" placeholder="FOR, DES, COS, INT, SAG, CAR">
        </div>
		
        <div class="form-group">
            <label>Note e Privilegi</label>
            <textarea id="input-note" rows="4"></textarea>
        </div>

        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn-salva" onclick="salvaDatiPersonaggio()">💾 Salva Modifiche / Nuovo</button>
            <button class="btn-salva" style="background:#8b0000; max-width:200px;" onclick="eliminaPersonaggioCorrente()">🗑️ Elimina PG</button>
        </div>
    </div>

    <!-- In fondo a index.html, sostituisci da qui in poi -->
    <script src="js/data.js"></script>
    <script src="js/logic.js"></script>
    <script>
        // Avvio sicuro della scheda
        try {
            if (typeof inizializzaApp === 'function') {
                inizializzaApp();
            } else {
                console.error("La funzione inizializzaApp non è stata trovata. Controlla il file logic.js");
            }
        } catch(e) {
            console.error("Errore durante l'inizializzazione:", e);
        }

        // Registrazione Service Worker per l'uso offline
        if ('serviceWorker' in navigator) { 
            navigator.serviceWorker.register('sw.js')
            .then(function() { console.log("Service Worker Registrato"); })
            .catch(function(err) { console.error("Errore SW:", err); });
        }
    </script>
</body>
</html>
</body>
</html>
